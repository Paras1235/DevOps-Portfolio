apiVersion: apps/v1
kind: Deployment
metadata:
  name: paras-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: portfolio
  template:
    metadata:
      labels:
        app: portfolio
    spec:
      containers:
      - name: portfolio-container
        image: paras1235/devops-portfolio:latest
        ports:
        - containerPort: 5000